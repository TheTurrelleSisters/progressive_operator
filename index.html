<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0010">
<meta name="apple-mobile-web-app-title" content="Prog Operator">
<link rel="manifest" href="manifest.json">
<title>Progressive Operator</title>
<style>
:root {
  --gold:    #ffd700;
  --gold-dk: #b8860b;
  --red:     #ff3300;
  --red-dk:  #8b1a00;
  --green:   #00ff88;
  --bg:      #0a0010;
  --bg2:     #140025;
  --bg3:     #1e003a;
  --border:  #3a006a;
  --text:    #e8d8ff;
  --dim:     #886699;
  --danger:  #ff2244;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; overflow: hidden; }

/* ── LOCK SCREEN ── */
#lock-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; gap: 16px;
}
#lock-title { font-size: 13px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
#lock-logo  { font-size: 28px; font-weight: 900; color: var(--gold);
  text-shadow: 0 0 12px #ff6600; letter-spacing: 2px; text-align: center; line-height: 1.2; }
#lock-sub   { font-size: 10px; color: var(--dim); letter-spacing: 2px; }
#pin-dots   { display: flex; gap: 10px; margin: 8px 0; }
.pin-dot    { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--gold-dk); background: transparent; transition: background .15s; }
.pin-dot.filled { background: var(--gold); }
#pin-error  { color: var(--danger); font-size: 11px; height: 14px; }
#pin-grid   { display: grid; grid-template-columns: repeat(3, 64px); gap: 10px; }
.pkey {
  height: 56px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--text); font-size: 20px; font-weight: bold;
  cursor: pointer; transition: background .1s, transform .08s;
  display: flex; align-items: center; justify-content: center;
}
.pkey:active { background: var(--bg3); transform: scale(.94); }
.pkey.wide   { grid-column: span 2; font-size: 13px; letter-spacing: 1px; color: var(--dim); }
.pkey.enter  { background: linear-gradient(135deg,#003a00,#006600); color: var(--green); font-size: 13px; }

/* ── APP ── */
#app { display: none; flex-direction: column; height: 100%; }
#app.visible { display: flex; }

/* ── HEADER ── */
#app-hdr {
  background: linear-gradient(135deg, #0a0010, #1e003a);
  border-bottom: 1.5px solid var(--gold-dk);
  padding: 10px 14px 8px;
  flex-shrink: 0;
}
#app-hdr-top { display: flex; justify-content: space-between; align-items: center; }
#app-title { font-size: 11px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
#conn-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; letter-spacing: 1px; }
#conn-badge.ok  { background: #003300; color: var(--green); border: 1px solid #006600; }
#conn-badge.err { background: #330000; color: var(--danger); border: 1px solid #660000; }

/* ── POT DISPLAY ── */
#pot-display {
  background: linear-gradient(135deg, #1a0000, #3a0010);
  border-bottom: 1px solid #ff4400;
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#pot-lbl { font-size: 9px; color: #ff8844; letter-spacing: 2px; text-transform: uppercase; }
#pot-val { font-size: 26px; font-weight: 900; color: #ffdd00;
  text-shadow: 0 0 8px #ff6600; font-family: 'Arial Black', Arial, sans-serif; }
#pot-meta { font-size: 9px; color: var(--dim); text-align: right; }

/* ── TABS ── */
#tab-bar {
  display: flex; border-bottom: 1.5px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.tab {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--dim);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── CONTENT ── */
#tab-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }

/* ── SECTIONS ── */
.section { margin-bottom: 18px; }
.sec-title {
  font-size: 9px; letter-spacing: 2px; color: var(--gold-dk);
  text-transform: uppercase; margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #1e003a;
}
.row:last-child { border-bottom: none; }
.row-lbl { font-size: 12px; color: var(--text); }
.row-sub { font-size: 9px; color: var(--dim); margin-top: 2px; }
.row-val { font-size: 14px; color: var(--gold); font-weight: bold; }
.inp {
  background: var(--bg3); border: 1.5px solid var(--border); border-radius: 6px;
  color: var(--gold); font-size: 14px; padding: 6px 10px; width: 110px;
  text-align: right; outline: none;
}
.inp:focus { border-color: var(--gold-dk); }

/* ── BUTTONS ── */
.btn {
  padding: 10px 16px; border-radius: 8px; border: none; font-size: 11px;
  font-weight: bold; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: transform .08s, opacity .1s;
}
.btn:active { transform: scale(.94); opacity: .85; }
.btn-gold    { background: linear-gradient(135deg,#5a3800,#b8860b); color: var(--gold); border: 1px solid var(--gold-dk); }
.btn-green   { background: linear-gradient(135deg,#003a00,#006600); color: var(--green); border: 1px solid #00aa44; }
.btn-danger  { background: linear-gradient(135deg,#3a0010,#660022); color: var(--danger); border: 1px solid #aa0033; }
.btn-full    { width: 100%; margin-top: 8px; padding: 12px; font-size: 12px; }

/* ── STATS GRID ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; text-align: center;
}
.stat-val { font-size: 20px; font-weight: 900; color: var(--gold); }
.stat-lbl { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-top: 2px; }

/* ── HISTORY ── */
.hit-row {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 8px;
}
.hit-amt  { font-size: 18px; font-weight: 900; color: #ffdd00; }
.hit-meta { font-size: 10px; color: var(--dim); margin-top: 3px; }
.hit-game { font-size: 10px; color: var(--gold); font-weight: bold; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1e003a; border: 1.5px solid var(--gold-dk); border-radius: 20px;
  padding: 8px 20px; font-size: 12px; color: var(--gold);
  transition: transform .3s ease; z-index: 999; pointer-events: none; white-space: nowrap;
}
#toast.on { transform: translateX(-50%) translateY(0); }
</style>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("service-worker.js").catch(function(e){console.warn(e);});});}
</script>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock-screen">
  <div id="lock-title">Stray-Pup LLC</div>
  <div id="lock-logo">PROGRESSIVE<br>OPERATOR</div>
  <div id="lock-sub">ENTER PIN TO CONTINUE</div>
  <div id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div id="pin-error"></div>
  <div id="pin-grid">
    <button class="pkey" onclick="pk('1')">1</button>
    <button class="pkey" onclick="pk('2')">2</button>
    <button class="pkey" onclick="pk('3')">3</button>
    <button class="pkey" onclick="pk('4')">4</button>
    <button class="pkey" onclick="pk('5')">5</button>
    <button class="pkey" onclick="pk('6')">6</button>
    <button class="pkey" onclick="pk('7')">7</button>
    <button class="pkey" onclick="pk('8')">8</button>
    <button class="pkey" onclick="pk('9')">9</button>
    <button class="pkey wide" onclick="pkClear()">CLEAR</button>
    <button class="pkey" onclick="pk('0')">0</button>
    <button class="pkey enter" onclick="pkEnter()">OK</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div id="app-hdr">
    <div id="app-hdr-top">
      <div id="app-title">&#9733; Progressive Operator</div>
      <div id="conn-badge" class="err">OFFLINE</div>
    </div>
  </div>

  <div id="pot-display">
    <div>
      <div id="pot-lbl">&#9733; Current Jackpot</div>
      <div id="pot-val">$500.00</div>
    </div>
    <div id="pot-meta">
      <div id="pot-ceiling-disp">Cap: $9,999.00</div>
      <div id="pot-seed-disp">Seed: $500.00</div>
      <div id="pot-hits-disp">Hits: 0</div>
    </div>
  </div>

  <div id="tab-bar">
    <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="tab" onclick="showTab('settings')">Settings</div>
    <div class="tab" onclick="showTab('history')">History</div>
    <div class="tab" onclick="showTab('force')">Force</div>
  </div>

  <div id="tab-content">
    <!-- content injected by JS -->
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════════════
   SUPABASE CONFIG — same values as progressive.js in each game
   ══════════════════════════════════════════════════════════════════════ */
var SUPABASE_URL      = 'https://gdmmoeggkqsvqnqyrubx.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_NGsKBAUUsVUvD5XKTblIdw_aBDPldSd';
var OP_PIN            = '7777'; // change this to your preferred PIN

/* ── State ── */
var _client     = null;
var _channel    = null;
var _connected  = false;
var _row        = { value:500, seed:500, ceiling:9999, contrib_rate:0.02, hit_count:0 };
var _hits       = [];
var _pinBuf     = '';
var _activeTab  = 'dashboard';

/* ══════════════════════════════════════════════════════════════════════
   PIN
   ══════════════════════════════════════════════════════════════════════ */
function pk(d) {
  if (_pinBuf.length >= 4) return;
  _pinBuf += d;
  updateDots();
  if (_pinBuf.length === 4) setTimeout(pkEnter, 80);
}
function pkClear() { _pinBuf = ''; updateDots(); document.getElementById('pin-error').textContent = ''; }
function pkEnter() {
  if (_pinBuf === OP_PIN) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initSupabase();
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN';
    _pinBuf = ''; updateDots();
  }
}
function updateDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < _pinBuf.length);
  }
}

/* ══════════════════════════════════════════════════════════════════════
   SUPABASE
   ══════════════════════════════════════════════════════════════════════ */
function initSupabase() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload = function() {
    try {
      _client    = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      _connected = true;
      document.getElementById('conn-badge').className = 'ok';
      document.getElementById('conn-badge').textContent = 'LIVE';
      fetchRow();
      fetchHits();
      subscribeRealtime();
    } catch(e) {
      setOffline();
    }
  };
  s.onerror = setOffline;
  document.head.appendChild(s);
}

function setOffline() {
  document.getElementById('conn-badge').className = 'err';
  document.getElementById('conn-badge').textContent = 'OFFLINE';
  renderTab();
}

function fetchRow() {
  _client.from('progressive').select('*').eq('id', 1).single().then(function(res) {
    if (res.error) { console.warn('fetch error', res.error); return; }
    _row = res.data;
    updatePotDisplay();
    renderTab();
  });
}

function fetchHits() {
  _client.from('progressive_hits').select('*').order('created_at', {ascending: false}).limit(50).then(function(res) {
    if (res.error) return;
    _hits = res.data || [];
    if (_activeTab === 'history') renderTab();
  });
}

function subscribeRealtime() {
  _channel = _client.channel('op-watch')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'progressive', filter:'id=eq.1' }, function(p) {
      _row = p.new;
      updatePotDisplay();
      renderTab();
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'progressive_hits' }, function(p) {
      _hits.unshift(p.new);
      if (_activeTab === 'history') renderTab();
    })
    .subscribe();
}

function updatePotDisplay() {
  document.getElementById('pot-val').textContent   = '$' + Number(_row.value).toFixed(2);
  document.getElementById('pot-ceiling-disp').textContent = 'Cap: $' + Number(_row.ceiling).toFixed(2);
  document.getElementById('pot-seed-disp').textContent    = 'Seed: $' + Number(_row.seed).toFixed(2);
  document.getElementById('pot-hits-disp').textContent    = 'Hits: ' + (_row.hit_count || 0);
}

/* ══════════════════════════════════════════════════════════════════════
   TABS
   ══════════════════════════════════════════════════════════════════════ */
function showTab(name) {
  _activeTab = name;
  document.querySelectorAll('.tab').forEach(function(t, i) {
    var names = ['dashboard','settings','history','force'];
    t.classList.toggle('active', names[i] === name);
  });
  renderTab();
}

function renderTab() {
  var el = document.getElementById('tab-content');
  if      (_activeTab === 'dashboard') el.innerHTML = renderDashboard();
  else if (_activeTab === 'settings')  el.innerHTML = renderSettings();
  else if (_activeTab === 'history')   el.innerHTML = renderHistory();
  else if (_activeTab === 'force')     el.innerHTML = renderForce();
}

/* ── Dashboard ── */
function renderDashboard() {
  var pct = _row.ceiling > _row.seed
    ? Math.min(100, ((_row.value - _row.seed) / (_row.ceiling - _row.seed)) * 100)
    : 0;
  return '<div class="section"><div class="sec-title">Pot Status</div>' +
    '<div style="background:#1e003a;border-radius:8px;height:10px;margin-bottom:12px;overflow:hidden">' +
    '<div style="background:linear-gradient(90deg,#ff4400,#ffdd00);height:100%;width:' + pct.toFixed(1) + '%;transition:width .5s"></div></div>' +
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="stat-val">$' + Number(_row.value).toFixed(0) + '</div><div class="stat-lbl">Current Pot</div></div>' +
    '<div class="stat-card"><div class="stat-val">$' + Number(_row.ceiling).toFixed(0) + '</div><div class="stat-lbl">Must-Hit Cap</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + ((_row.contrib_rate || 0) * 100).toFixed(1) + '%</div><div class="stat-lbl">Contrib Rate</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + (_row.hit_count || 0) + '</div><div class="stat-lbl">Total Hits</div></div>' +
    '</div></div>' +
    '<div class="section"><div class="sec-title">Last Hit</div>' +
    (_hits.length > 0
      ? '<div class="hit-row"><div class="hit-game">' + (_hits[0].game_id||'—') + ' &bull; ' + _denom(_hits[0].denom) + '</div>' +
        '<div class="hit-amt">$' + Number(_hits[0].amount).toFixed(2) + '</div>' +
        '<div class="hit-meta">' + (_hits[0].pattern||'') + ' &bull; ' + _balls(_hits[0].balls) + ' &bull; ' + _ts(_hits[0].created_at) + '</div></div>'
      : '<div style="color:var(--dim);font-size:12px">No hits recorded yet.</div>') +
    '</div>' +
    '<div class="section"><div class="sec-title">Connection</div>' +
    '<div class="row"><div><div class="row-lbl">Supabase Realtime</div><div class="row-sub">Pot syncs across all devices live</div></div>' +
    '<div class="row-val" style="color:' + (_connected ? 'var(--green)' : 'var(--danger)') + '">' + (_connected ? 'LIVE' : 'OFFLINE') + '</div></div>' +
    '</div>';
}

/* ── Settings ── */
function renderSettings() {
  return '<div class="section"><div class="sec-title">Jackpot Settings</div>' +
    '<div class="row"><div><div class="row-lbl">Seed (reset to)</div><div class="row-sub">Value after each hit</div></div>' +
    '<input class="inp" id="inp-seed" type="number" min="1" max="99999" step="50" value="' + Number(_row.seed).toFixed(2) + '"></div>' +
    '<div class="row"><div><div class="row-lbl">Must-Hit Ceiling</div><div class="row-sub">Pot cannot exceed this</div></div>' +
    '<input class="inp" id="inp-ceiling" type="number" min="100" max="999999" step="100" value="' + Number(_row.ceiling).toFixed(2) + '"></div>' +
    '<div class="row"><div><div class="row-lbl">Contribution Rate</div><div class="row-sub">% of each bet added</div></div>' +
    '<input class="inp" id="inp-contrib" type="number" min="0.1" max="10" step="0.1" value="' + (((_row.contrib_rate)||0.02)*100).toFixed(1) + '"></div>' +
    '<button class="btn btn-gold btn-full" onclick="saveSettings()">SAVE SETTINGS</button>' +
    '</div>' +
    '<div class="section"><div class="sec-title">Danger Zone</div>' +
    '<button class="btn btn-danger btn-full" onclick="resetToSeed()">RESET POT TO SEED</button>' +
    '<button class="btn btn-danger btn-full" style="margin-top:8px" onclick="setCustomValue()">SET POT TO CUSTOM VALUE</button>' +
    '</div>';
}

/* ── History ── */
function renderHistory() {
  var h = '<div class="section"><div class="sec-title">Hit History (' + _hits.length + ')</div>';
  if (_hits.length === 0) {
    h += '<div style="color:var(--dim);font-size:12px">No jackpot hits yet.</div>';
  } else {
    _hits.forEach(function(hit) {
      h += '<div class="hit-row">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div class="hit-game">' + (hit.game_id||'?') + ' &bull; ' + _denom(hit.denom) + ' denom</div>' +
        '<div class="hit-amt">$' + Number(hit.amount).toFixed(2) + '</div></div>' +
        '<div class="hit-meta">' + (hit.pattern||'') + ' &bull; ' + _balls(hit.balls) + ' &bull; Bet: $' + Number(hit.bet||0).toFixed(2) + '</div>' +
        '<div class="hit-meta" style="margin-top:2px">' + _ts(hit.created_at) + '</div>' +
        '</div>';
    });
  }
  h += '</div>';
  return h;
}

/* ── Force ── */
function renderForce() {
  return '<div class="section"><div class="sec-title">Test & Force Tools</div>' +
    '<div style="background:#1a0010;border:1px solid #660022;border-radius:8px;padding:10px;margin-bottom:14px;font-size:10px;color:#cc6688;line-height:1.5">' +
    '&#9888; Force tools are for testing only. A forced hit records in the hit log and resets the pot to seed.' +
    '</div>' +
    '<button class="btn btn-danger btn-full" onclick="forceHit()">FORCE JACKPOT HIT NOW</button>' +
    '<button class="btn btn-gold btn-full" style="margin-top:10px" onclick="addTestContrib()">+ ADD $50 TEST CONTRIBUTION</button>' +
    '<button class="btn btn-green btn-full" style="margin-top:10px" onclick="fetchRow();fetchHits();toast(\'Refreshed\')">REFRESH DATA</button>' +
    '</div>';
}

/* ══════════════════════════════════════════════════════════════════════
   ACTIONS
   ══════════════════════════════════════════════════════════════════════ */
function saveSettings() {
  if (!_connected) { toast('Not connected'); return; }
  var seed    = parseFloat(document.getElementById('inp-seed').value);
  var ceiling = parseFloat(document.getElementById('inp-ceiling').value);
  var contrib = parseFloat(document.getElementById('inp-contrib').value) / 100;
  if (isNaN(seed) || seed < 1)         { toast('Invalid seed'); return; }
  if (isNaN(ceiling) || ceiling < seed) { toast('Ceiling must be > seed'); return; }
  if (isNaN(contrib) || contrib <= 0)   { toast('Invalid contrib rate'); return; }
  _client.from('progressive').update({
    seed: seed, ceiling: ceiling, contrib_rate: contrib
  }).eq('id', 1).then(function(res) {
    if (res.error) { toast('Save failed'); return; }
    toast('Settings saved');
    fetchRow();
  });
}

function resetToSeed() {
  if (!_connected) { toast('Not connected'); return; }
  if (!confirm('Reset pot to $' + Number(_row.seed).toFixed(2) + '?')) return;
  _client.from('progressive').update({ value: _row.seed }).eq('id', 1).then(function(res) {
    if (res.error) { toast('Reset failed'); return; }
    toast('Pot reset to seed');
  });
}

function setCustomValue() {
  if (!_connected) { toast('Not connected'); return; }
  var v = parseFloat(prompt('Enter new pot value ($):'));
  if (isNaN(v) || v < 0) { toast('Invalid value'); return; }
  _client.from('progressive').update({ value: v }).eq('id', 1).then(function(res) {
    if (res.error) { toast('Update failed'); return; }
    toast('Pot set to $' + v.toFixed(2));
  });
}

function forceHit() {
  if (!_connected) { toast('Not connected'); return; }
  if (!confirm('Force a jackpot hit of $' + Number(_row.value).toFixed(2) + '?')) return;
  var rec = {
    game_id: 'operator_force', denom: 0,
    amount: _row.value, pattern: 'Operator Force Hit', balls: 0, bet: 0
  };
  _client.from('progressive_hits').insert(rec).then(function() {
    _client.rpc('progressive_hit', { reset_to: _row.seed }).then(function(res) {
      if (res.error) { toast('Force failed'); return; }
      toast('Jackpot forced — pot reset');
      fetchRow(); fetchHits();
    });
  });
}

function addTestContrib() {
  if (!_connected) { toast('Not connected'); return; }
  _client.rpc('progressive_contribute', { add_amount: 50 }).then(function(res) {
    if (res.error) { toast('Failed'); return; }
    toast('+$50 added to pot');
  });
}

/* ── Helpers ── */
function _denom(d) { return d ? '$' + Number(d).toFixed(2) : '—'; }
function _balls(b) { return b ? b + ' balls' : ''; }
function _ts(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch(e) { return ts; }
}
function toast(m) {
  var el = document.getElementById('toast');
  el.textContent = m; el.classList.add('on');
  setTimeout(function() { el.classList.remove('on'); }, 2400);
}

/* ── Boot ── */
renderTab();
</script>
